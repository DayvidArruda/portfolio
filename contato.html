<!DOCTYPE html>

<head>

    <title>Dayvid Arruda | Contato</title>
</head>

<body>
    <!--inicio navbar-->
    <nav>
        <div class="container">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>

            </ul>
        </div>
    </nav>
    <!--fim navbar-->

    <!--inicio seção - formulario-->
    <section id="contato">
        <div class="container">
            <h1>Contato</h1>
            <p>Gostou do meu trabalho? Entre em contato comigo!</p>

            <form action="https://formspree.io/f/mayvlrpl" method="POST">
                <div class="input-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Seu melhor e-mail" required>
                </div>

                <div class="input-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem"
                        required></textarea>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </div>

    </section>
    <footer>
        <div class="footer-content">
            <p>© 2026 Dayvid Arruda - Todos os direitos reservados</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
